<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 Gait Analyzer - Pose Video Player</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
            color: #eee;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 10px; color: #4CAF50; font-size: 2em; }
        .subtitle { text-align: center; color: #888; margin-bottom: 30px; }
        
        /* Video Container */
        .video-wrapper {
            position: relative;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            margin-bottom: 20px;
        }
        video { width: 100%; display: block; }
        #poseCanvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
        }
        
        /* Controls */
        .controls {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 16px;
        }
        
        /* Progress Bar */
        .progress-bar {
            width: 100%;
            height: 12px;
            background: #1a1a2e;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }
        .progress-bar:hover { height: 16px; }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4CAF50, #8BC34A);
            border-radius: 6px;
            width: 0%;
            transition: width 0.05s linear;
        }
        
        /* Buttons */
        .btn-row {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        button {
            padding: 14px 28px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: linear-gradient(135deg, #1a4a7a, #0f3460);
            color: #fff;
            transition: all 0.2s;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 25px rgba(76, 175, 80, 0.4);
            background: linear-gradient(135deg, #2a5a8a, #1a4a7a);
        }
        button:active { transform: translateY(-1px); }
        button.play {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            font-size: 20px;
            padding: 16px 40px;
        }
        button.play:hover {
            background: linear-gradient(135deg, #45a049, #3d8b40);
        }
        
        /* Info Display */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .info-box {
            background: rgba(15, 52, 96, 0.6);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        .info-label { font-size: 11px; color: #888; margin-bottom: 5px; text-transform: uppercase; }
        .info-value { font-size: 22px; font-weight: bold; color: #4CAF50; }
        
        /* Settings */
        .settings {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .setting {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .setting label { font-size: 14px; color: #ccc; }
        input[type="range"] { width: 120px; cursor: pointer; }
        .val { font-weight: bold; color: #4CAF50; min-width: 45px; }
        
        /* Status */
        .status {
            text-align: center;
            padding: 12px;
            background: rgba(15, 52, 96, 0.4);
            border-radius: 8px;
            margin-top: 15px;
            font-size: 14px;
        }
        .status.playing { background: rgba(76, 175, 80, 0.2); color: #4CAF50; }
        
        /* Loading */
        .loading {
            text-align: center;
            padding: 60px 20px;
        }
        .spinner {
            width: 50px; height: 50px;
            border: 4px solid #1a1a2e;
            border-top: 4px solid #4CAF50;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* File Input */
        .file-section {
            background: rgba(255,255,255,0.05);
            padding: 40px;
            border-radius: 16px;
            text-align: center;
        }
        .file-section h3 { margin-bottom: 25px; color: #4CAF50; }
        .file-row { margin-bottom: 25px; }
        .file-row label { display: block; margin-bottom: 12px; font-size: 14px; color: #aaa; }
        input[type="file"] { display: none; }
        .file-btn {
            display: inline-block;
            padding: 14px 32px;
            background: #1a4a7a;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }
        .file-btn:hover { background: #2a5a8a; transform: translateY(-2px); }
        .file-name { margin-top: 10px; color: #4CAF50; font-size: 14px; }
        .start-btn {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
            padding: 18px 60px;
            font-size: 20px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 20px;
            font-weight: bold;
            box-shadow: 0 6px 25px rgba(76, 175, 80, 0.4);
        }
        .start-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 35px rgba(76, 175, 80, 0.5); }
        .start-btn:disabled { background: #444; cursor: not-allowed; transform: none; box-shadow: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 Gait Analyzer</h1>
        <p class="subtitle">Pose Estimation Video Player</p>
        
        <!-- File Selection -->
        <div id="fileSection" class="file-section">
            <h3>📁 Dateien auswählen</h3>
            <div class="file-row">
                <label>1️⃣ Video-Datei</label>
                <label class="file-btn">📹 Video wählen<input type="file" id="videoInput" accept="video/*"></label>
                <div class="file-name" id="videoName">Keine Datei</div>
            </div>
            <div class="file-row">
                <label>2️⃣ Keypoints JSON</label>
                <label class="file-btn">📊 JSON wählen<input type="file" id="jsonInput" accept=".json"></label>
                <div class="file-name" id="jsonName">Keine Datei</div>
            </div>
            <button id="startBtn" class="start-btn" disabled>▶️ Player starten</button>
        </div>
        
        <!-- Loading -->
        <div id="loading" class="loading" style="display:none;">
            <div class="spinner"></div>
            <div>Lade Daten...</div>
        </div>
        
        <!-- Player -->
        <div id="player" style="display:none;">
            <div class="video-wrapper">
                <video id="video"><source src="" type="video/mp4">Dein Browser unterstützt kein Video.</video>
                <canvas id="poseCanvas"></canvas>
            </div>
            
            <div class="controls">
                <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
                
                <div class="btn-row">
                    <button onclick="seek(0)">⏮️ Start</button>
                    <button onclick="seekRel(-10)">⏮️ -10s</button>
                    <button onclick="seekRel(-1)">⏮️ -1s</button>
                    <button id="playBtn" class="play" onclick="togglePlay()">▶️ Abspielen</button>
                    <button onclick="seekRel(1)">⏭️ +1s</button>
                    <button onclick="seekRel(10)">⏭️ +10s</button>
                    <button onclick="speed(-0.25)">🐌</button>
                    <button onclick="speed(0.25)">🚀</button>
                </div>
                
                <div class="info-grid">
                    <div class="info-box"><div class="info-label">Frame</div><div class="info-value" id="frameVal">0</div></div>
                    <div class="info-box"><div class="info-label">Zeit</div><div class="info-value" id="timeVal">0.00s</div></div>
                    <div class="info-box"><div class="info-label">Speed</div><div class="info-value" id="speedVal">1.0x</div></div>
                    <div class="info-box"><div class="info-label">FPS</div><div class="info-value" id="fpsVal">30</div></div>
                </div>
                
                <div class="settings">
                    <div class="setting">
                        <label>Confidence:</label>
                        <input type="range" id="confSlider" min="0" max="100" value="50">
                        <span class="val" id="confVal">0.5</span>
                    </div>
                    <div class="setting">
                        <label>Skeleton:</label>
                        <input type="checkbox" id="skelCheck" checked>
                    </div>
                    <div class="setting">
                        <label>Points:</label>
                        <input type="checkbox" id="ptsCheck" checked>
                    </div>
                </div>
                
                <div class="status" id="status">Bereit</div>
            </div>
        </div>
    </div>
    
    <script>
        let kpData = [], fps = 30, minConf = 0.5, showSkel = true, showPts = true;
        const skeleton = [[0,1,'#F00'],[1,3,'#F00'],[0,2,'#F00'],[2,4,'#F00'],[5,6,'#FF0'],[5,7,'#0F0'],[7,9,'#0F0'],[6,8,'#F0F'],[8,10,'#F0F'],[5,11,'#0F0'],[6,12,'#F0F'],[11,12,'#FF0'],[11,13,'#0F0'],[13,15,'#0F0'],[12,14,'#F0F'],[14,16,'#F0F']];
        
        const video = document.getElementById('video'), canvas = document.getElementById('poseCanvas'), ctx = canvas.getContext('2d'), playBtn = document.getElementById('playBtn'), progressFill = document.getElementById('progressFill'), progressBar = document.getElementById('progressBar');
        
        let videoFile = null, jsonFile = null;
        
        document.getElementById('videoInput').addEventListener('change', e => { videoFile = e.target.files[0]; document.getElementById('videoName').textContent = videoFile?.name || 'Keine Datei'; check(); });
        document.getElementById('jsonInput').addEventListener('change', e => { jsonFile = e.target.files[0]; document.getElementById('jsonName').textContent = jsonFile?.name || 'Keine Datei'; check(); });
        
        function check() { document.getElementById('startBtn').disabled = !(videoFile && jsonFile); }
        
        document.getElementById('startBtn').addEventListener('click', async () => {
            if (!videoFile || !jsonFile) return;
            document.getElementById('fileSection').style.display = 'none';
            document.getElementById('loading').style.display = 'block';
            
            try {
                video.src = URL.createObjectURL(videoFile);
                const data = JSON.parse(await jsonFile.text());
                kpData = data.keypoints;
                fps = data.metadata?.video_info?.fps || 30;
                document.getElementById('fpsVal').textContent = fps;
                
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('player').style.display = 'block';
                    setStatus('✅ Bereit');
                };
                
                video.ontimeupdate = draw;
                video.onplay = () => { playBtn.textContent = '⏸️ Pause'; setStatus('▶️ Abspielen'); };
                video.onpause = () => { playBtn.textContent = '▶️ Abspielen'; setStatus('⏸️ Pause'); };
                video.onended = () => { playBtn.textContent = '▶️ Abspielen'; setStatus('✅ Ende'); };
                
                document.getElementById('confSlider').oninput = e => { minConf = e.target.value/100; document.getElementById('confVal').textContent = minConf.toFixed(1); draw(); };
                document.getElementById('skelCheck').onchange = e => { showSkel = e.target.checked; draw(); };
                document.getElementById('ptsCheck').onchange = e => { showPts = e.target.checked; draw(); };
                progressBar.onclick = e => { video.currentTime = (e.offsetX / progressBar.offsetWidth) * video.duration; };
            } catch(err) { alert('Fehler: '+err.message); location.reload(); }
        });
        
        function draw() {
            const t = video.currentTime, frame = Math.min(Math.floor(t * fps), kpData.length - 1);
            document.getElementById('frameVal').textContent = frame;
            document.getElementById('timeVal').textContent = t.toFixed(2) + 's';
            document.getElementById('speedVal').textContent = video.playbackRate.toFixed(2) + 'x';
            progressFill.style.width = (video.currentTime / video.duration * 100) + '%';
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const kp = kpData[frame]?.keypoints;
            if (!kp) return;
            
            if (showSkel) skeleton.forEach(([i,j,c]) => { if(kp[i]&&kp[j]&&kp[i].length>=3&&kp[j].length>=3&&kp[i][2]>=minConf&&kp[j][2]>=minConf){ ctx.beginPath(); ctx.moveTo(kp[i][0],kp[i][1]); ctx.lineTo(kp[j][0],kp[j][1]); ctx.strokeStyle=c; ctx.lineWidth=3; ctx.stroke(); }});
            
            if (showPts) kp.forEach(p => { if(p&&p.length>=3&&p[2]>=minConf){ ctx.beginPath(); ctx.arc(p[0],p[1],5,0,Math.PI*2); ctx.fillStyle=p[2]>=0.8?'#0F0':p[2]>=0.5?'#FF0':'#F00'; ctx.fill(); }});
        }
        
        function togglePlay() { video.paused ? video.play() : video.pause(); }
        function seek(t) { video.currentTime = t; }
        function seekRel(s) { seek(Math.max(0, Math.min(video.duration, video.currentTime + s))); }
        function speed(d) { video.playbackRate = Math.max(0.25, Math.min(4, video.playbackRate + d)); document.getElementById('speedVal').textContent = video.playbackRate.toFixed(2) + 'x'; }
        function setStatus(s) { document.getElementById('status').textContent = s; document.getElementById('status').className = 'status' + (video.paused ? '' : ' playing'); }
    </script>
</body>
</html>
